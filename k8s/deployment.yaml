apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgre
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
      - name: postgre
        image: postgres:latest
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: "admin"
        - name: POSTGRES_PASSWORD
          value: "Pg@15963"
        - name: POSTGRES_DB
          value: "kubenews"
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
spec:
  selector:
    app: postgresql
  ports:
  - port: 5432
    targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubenwes
spec:
  selector:
    matchLabels:
      app: kubenwes
  template:
    metadata:
      labels:
        app: kubenwes
    spec:
      containers:
      - name: kubenwes
        image: vinicius88/kube-news:v2
        ports:
        - containerPort: 8080
        env:
        - name: DB_HOST
          value: "postgresql"
        - name: DB_USERNAME
          value: "admin"
        - name: DB_PASSWORD
          value: "Pg@15963"
        - name: DB_DATABASE
          value: "kubenews"
---
apiVersion: v1
kind: Service
metadata:
  name: kubenews
spec:
  selector:
    app: kubenwes
  type: NodePort
  ports:
  - port: 80
    targetPort: 8080
    nodePort: 30000
